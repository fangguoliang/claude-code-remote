name: Diagnose macOS PTY

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          pnpm install

          echo ""
          echo "=== Check if node-pty was built ==="
          ls -la node_modules/node-pty/build/Release/ 2>/dev/null || echo "No build directory"

          echo ""
          echo "=== Force rebuild node-pty ==="
          cd packages/agent && pnpm rebuild node-pty 2>&1 || npm rebuild node-pty 2>&1 || echo "Rebuild attempted"

          echo ""
          echo "=== Check again ==="
          ls -la ../../node_modules/node-pty/build/Release/ 2>/dev/null || echo "Still no build directory"

          echo ""
          echo "=== Check node-pty native module ==="
          file ../../node_modules/node-pty/build/Release/pty.node 2>/dev/null || echo "Native module not found"
          otool -L ../../node_modules/node-pty/build/Release/pty.node 2>/dev/null || echo "otool failed"

      - name: Diagnose shell environment
        run: |
          echo "=== Shell paths ==="
          ls -la /bin/zsh /bin/bash /bin/sh 2>&1

          echo ""
          echo "=== Shell versions ==="
          /bin/zsh --version 2>&1 || echo "zsh failed"
          /bin/bash --version 2>&1 || echo "bash failed"

          echo ""
          echo "=== Current user ==="
          whoami
          id

          echo ""
          echo "=== Environment ==="
          echo "HOME: $HOME"
          echo "SHELL: $SHELL"

          echo ""
          echo "=== Test spawn via child_process ==="
          node -e "
            const { spawn } = require('child_process');
            const shells = ['/bin/zsh', '/bin/bash', '/bin/sh'];
            for (const shell of shells) {
              const p = spawn(shell, ['-c', 'echo SUCCESS with ' + shell]);
              let output = '';
              p.stdout.on('data', d => output += d);
              p.stderr.on('data', d => output += d);
              p.on('close', (code) => {
                console.log(shell + ' exit code:', code, 'output:', output.trim());
              });
            }
          "
          sleep 2

      - name: Check PTY devices
        run: |
          echo "=== Check /dev/pt* ==="
          ls -la /dev/pt* 2>&1 || echo "No /dev/pt* found"

          echo ""
          echo "=== Check /dev/tty* ==="
          ls -la /dev/tty* 2>&1 | head -10 || echo "No /dev/tty* found"

          echo ""
          echo "=== Check for pty devices ==="
          ls -la /dev/pty* 2>&1 || echo "No /dev/pty* found"

          echo ""
          echo "=== Try opening a pty via script command ==="
          script -q /dev/null echo "Script test works" 2>&1 || echo "Script command failed"

      - name: Test node-pty spawn
        run: |
          echo "=== Check node-pty module ==="
          ls -la node_modules/node-pty/build/Release/

          echo ""
          echo "=== Check node-pty version and arch ==="
          node -e "console.log(require('node-pty/package.json').version)"
          node -e "console.log(process.arch, process.platform)"

          echo ""
          echo "=== Try rebuilding node-pty ==="
          npm rebuild node-pty 2>&1 || echo "Rebuild completed with warnings"

          echo ""
          echo "=== Test node-pty with different shells ==="

          node -e "
            const pty = require('node-pty');

            const tests = [
              { shell: '/bin/zsh', args: [], method: 'spawn' },
              { shell: '/bin/bash', args: [], method: 'spawn' },
              { shell: '/bin/bash', args: [], method: 'fork' },
              { shell: '/bin/sh', args: [], method: 'spawn' },
            ];

            let current = 0;

            function runTest() {
              if (current >= tests.length) {
                console.log('\\n=== All tests completed ===');
                process.exit(0);
              }

              const test = tests[current];
              console.log('\\n--- Test ' + (current + 1) + ': ' + test.method + ' ' + test.shell + ' ' + JSON.stringify(test.args) + ' ---');

              try {
                let p;
                if (test.method === 'fork') {
                  // Try fork method
                  p = pty.fork(test.shell, test.args, {
                    name: 'xterm-256color',
                    cols: 80,
                    rows: 24,
                    cwd: process.env.HOME,
                    env: process.env
                  });
                } else {
                  p = pty.spawn(test.shell, test.args, {
                    name: 'xterm-256color',
                    cols: 80,
                    rows: 24,
                    cwd: process.env.HOME,
                    env: process.env
                  });
                }

                let output = '';
                p.onData((data) => {
                  output += data;
                });

                p.write('echo PTY_SUCCESS\\n');

                setTimeout(() => {
                  if (output.includes('PTY_SUCCESS')) {
                    console.log('SUCCESS: PTY spawned and responded');
                  } else {
                    console.log('PARTIAL: PTY created but no response');
                    console.log('Output:', output.substring(0, 200));
                  }
                  p.kill();
                  current++;
                  setTimeout(runTest, 500);
                }, 2000);

                p.onExit(({ exitCode }) => {
                  console.log('Exit code:', exitCode);
                });

              } catch (e) {
                console.log('FAILED:', e.message);
                current++;
                setTimeout(runTest, 500);
              }
            }

            runTest();
          "

      - name: Build and test
        run: |
          cd packages/shared && pnpm build
          cd ../agent
          pnpm build
          pnpm test