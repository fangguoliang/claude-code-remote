name: macOS Agent Test

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Run duration in minutes'
        required: true
        default: '10'
        type: number

jobs:
  run-mac-agent:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: |
          cd packages/shared && pnpm build
          cd ../agent && pnpm build

      - name: Run macOS Agent
        env:
          SERVER_URL: ws://123.57.34.57:3000/ws/agent
          AGENT_ID: macos-test-agent
          USER_ID: 1
        run: |
          echo "Starting macOS agent..."
          echo "Agent ID: macos-test-agent"
          echo "Server: ws://123.57.34.57:3000/ws/agent"
          echo ""

          # Create .env file
          echo "SERVER_URL=$SERVER_URL" > packages/agent/.env
          echo "AGENT_ID=$AGENT_ID" >> packages/agent/.env
          echo "USER_ID=$USER_ID" >> packages/agent/.env

          # Run agent for specified duration (macOS doesn't have timeout command)
          cd packages/agent
          node -e "
            const { spawn } = require('child_process');
            const proc = spawn('node', ['dist/index.js'], {
              stdio: 'inherit',
              env: { ...process.env, SERVER_URL: '$SERVER_URL', AGENT_ID: '$AGENT_ID', USER_ID: '1' }
            });
            proc.on('error', (e) => { console.error('Failed to start:', e); process.exit(1); });
            proc.on('exit', (code) => process.exit(code || 0));
            setTimeout(() => {
              console.log('\\nDuration elapsed, stopping agent...');
              proc.kill('SIGTERM');
              setTimeout(() => process.exit(0), 1000);
            }, ${{ inputs.duration }} * 60 * 1000);
          "

      - name: Cleanup
        if: always()
        run: echo "macOS Agent test completed"