name: macOS Test

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [master, main]
    paths:
      - 'packages/agent/**'
      - 'packages/shared/**'
      - '.github/workflows/macos-test.yml'

jobs:
  test-macos:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build shared package
        run: cd packages/shared && pnpm build

      - name: Run agent tests
        run: cd packages/agent && pnpm test

      - name: Test shell detection
        run: |
          echo "=== Platform info ==="
          echo "Platform: $(uname -s)"
          echo "Architecture: $(uname -m)"
          echo "Default shell: $SHELL"

          echo ""
          echo "=== Checking available shells ==="
          which zsh && echo "zsh: $(zsh --version)" || echo "zsh: not found"
          which bash && echo "bash: $(bash --version | head -1)" || echo "bash: not found"
          which sh && echo "sh: available" || echo "sh: not found"

          echo ""
          echo "=== Testing node-pty spawn (without -l flag) ==="
          node -e "
            const pty = require('node-pty');

            console.log('Test: Spawning /bin/zsh without -l...');
            const p = pty.spawn('/bin/zsh', [], {
              name: 'xterm-256color',
              cols: 80,
              rows: 24,
              cwd: process.env.HOME,
              env: process.env
            });
            p.write('echo PTY_TEST_SUCCESS\\n');
            p.onData((data) => {
              if (data.includes('PTY_TEST_SUCCESS')) {
                console.log('PTY spawn test: PASSED');
                p.kill();
                process.exit(0);
              }
            });
            setTimeout(() => {
              console.log('PTY spawn test: TIMEOUT');
              p.kill();
              process.exit(1);
            }, 5000);
          "

          echo ""
          echo "=== Testing node-pty spawn (with -l flag - known issue) ==="
          node -e "
            const pty = require('node-pty');

            console.log('Test: Spawning /bin/zsh with -l...');
            try {
              const p = pty.spawn('/bin/zsh', ['-l'], {
                name: 'xterm-256color',
                cols: 80,
                rows: 24,
                cwd: process.env.HOME,
                env: process.env
              });
              p.write('echo PTY_L_FLAG_SUCCESS\\n');
              p.onData((data) => {
                if (data.includes('PTY_L_FLAG_SUCCESS')) {
                  console.log('PTY spawn test (zsh -l): PASSED');
                  p.kill();
                  process.exit(0);
                }
              });
              p.onExit(({ exitCode }) => {
                if (exitCode !== 0) {
                  console.log('PTY (zsh -l) exited with code:', exitCode);
                  console.log('Note: -l flag has known issues on some macOS versions');
                  process.exit(0);  // Don't fail
                }
              });
              setTimeout(() => {
                console.log('PTY spawn test (zsh -l): TIMEOUT');
                console.log('Note: -l flag has known issues on some macOS versions');
                p.kill();
                process.exit(0);  // Don't fail CI for known issue
              }, 5000);
            } catch (e) {
              console.log('PTY spawn test (zsh -l) error:', e.message);
              console.log('This is a known issue on macOS');
              process.exit(0);
            }
          " || echo "Known issue with -l flag, continuing..."

      - name: Build agent package
        run: cd packages/agent && pnpm build

      - name: Cleanup
        if: always()
        run: echo "macOS test completed"